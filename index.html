<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="heart-container"></div>

    <div class="card" id="main-card">
        <div class="icon-container" id="main-frame" onclick="triggerGiftClick()">
            <svg id="icon-svg" viewBox="0 0 24 24">
                <path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.67-.5-.68C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM9 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm11 15H4v-2h16v2zm0-5H4V8h16v6z"/>
            </svg>
        </div>

        <div id="phase-1" class="phase-container active">
            <div id="click-hint" class="hint-text">Klik kadonya dong!</div>
        </div>

        <div id="phase-2" class="phase-container">
            <h2 class="section-title">Tahun Lahir Kamuuu? </h2>
            <input type="range" id="year-slider" min="1995" max="2020" value="2009" oninput="updateYearDisplay(this.value)">
            <div id="year-display">2009</div>
            <button class="btn-lanjutkan" onclick="goToCalc()">Lanjutkan</button>
        </div>

        <div id="phase-3" class="phase-container">
            <h2 class="section-title">Jawab dulu! Berapa 5 + 7 ?</h2>
            
            <div class="calculator-box">
                <div class="calc-screen" id="calc-display">0</div>
                
                <div class="calc-buttons">
                    <button onclick="pressNum('7')">7</button>
                    <button onclick="pressNum('8')">8</button>
                    <button onclick="pressNum('9')">9</button>
                    <button onclick="pressNum('4')">4</button>
                    <button onclick="pressNum('5')">5</button>
                    <button onclick="pressNum('6')">6</button>
                    <button onclick="pressNum('1')">1</button>
                    <button onclick="pressNum('2')">2</button>
                    <button onclick="pressNum('3')">3</button>
                    <button class="btn-clear" onclick="clearCalc()">C</button>
                    <button onclick="pressNum('0')">0</button>
                    <button class="btn-equal" onclick="checkAnswer()">=</button>
                </div>
            </div>
            <p id="calc-error" class="error-text"></p>
        </div>

        <div id="phase-4" class="phase-container">
            <div class="small-heart">❤</div>
            <h1 id="dynamic-h1">Selamat Ulang Tahun!</h1>
            <p id="typing-text"></p>
        </div>

        <footer> </footer>
    </div>

    <audio id="bg-music" src="Download.mp3" loop></audio>

    <script src="script.js"></script>
</body>
</html>
